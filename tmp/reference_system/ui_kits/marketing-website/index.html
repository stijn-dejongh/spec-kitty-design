<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Spec Kitty — Marketing Website Kit</title>
  <link rel="icon" href="../../assets/favicon.png" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="kit.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="MutedInfo.jsx"></script>
  <script type="text/babel" src="FeatureCards.jsx"></script>
  <script type="text/babel" src="Callout.jsx"></script>
  <script type="text/babel" src="FAQGrid.jsx"></script>
  <script type="text/babel" src="ComparisonTable.jsx"></script>
  <script type="text/babel" src="WorkshopForm.jsx"></script>
  <script type="text/babel" src="PricingCard.jsx"></script>
  <script type="text/babel" src="BlogIndex.jsx"></script>
  <script type="text/babel" src="Changelog.jsx"></script>
  <script type="text/babel" src="CTAFooter.jsx"></script>

  <script type="text/babel">
    function App() {
      const [page, setPage] = React.useState('Platform');
      const [theme, setTheme] = React.useState('dark');
      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      // Render different sections based on active nav (click-through prototype)
      let body;
      if (page === 'Platform') body = <>
        <window.SKHero />
        <window.SKFeatureCards />
        <window.SKCallout />
        <window.SKFAQGrid />
        <window.SKComparisonTable />
        <window.SKCTABlock />
      </>;
      else if (page === 'Getting Started') body = <window.SKMutedInfo />;
      else if (page === 'Blog') body = <window.SKBlogIndex />;
      else if (page === 'Training') body = <>
        <window.SKPricingCard />
        <window.SKWorkshopForm />
      </>;
      else if (page === 'About') body = <window.SKChangelog />;

      // Wire nav by passing onClick down via a wrapper
      return <div data-screen-label={`Marketing — ${page}`}>
        <NavWrapped active={page} setPage={setPage} theme={theme} setTheme={setTheme} />
        {body}
        <window.SKFooter />
      </div>;
    }

    // Wrap Header so we can attach onClick handlers without changing its file
    function NavWrapped({ active, setPage, theme, setTheme }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (!ref.current) return;
        const links = ref.current.querySelectorAll('nav a');
        const items = ['Platform', 'Getting Started', 'About', 'Blog', 'Training'];
        links.forEach((a, i) => {
          a.onclick = (e) => { e.preventDefault(); setPage(items[i]); };
        });
      });
      return <div ref={ref}>
        <window.SKHeader active={active} theme={theme}
          onTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} />
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
