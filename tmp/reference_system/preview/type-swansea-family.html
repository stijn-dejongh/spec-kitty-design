<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--sk-bg-0); color:var(--sk-fg-0); font-family:var(--sk-font-reference); }
  .row { display:grid; grid-template-columns: 110px 1fr; gap:16px 18px; align-items:baseline; }
  .label { font-family:var(--sk-font-mono); font-size:10px; color:var(--sk-fg-3); letter-spacing:0.14em; text-transform:uppercase; }
  .sample { font-size:24px; line-height:1.05; }
  .body { font-size:15px; line-height:1.6; color:var(--sk-fg-1); margin-top:18px; max-width:560px; }
</style><script id="__sk-theme-param__">(function(){var p=new URLSearchParams(location.search).get('theme');if(p){document.documentElement.setAttribute('data-theme',p);}})();</script>
</head><body>
<div class="row">
  <div class="label">400</div><div class="sample" style="font-weight:400">Swansea Regular</div>
  <div class="label">400 it</div><div class="sample" style="font-weight:400;font-style:italic">Swansea Italic</div>
  <div class="label">700</div><div class="sample" style="font-weight:700">Swansea Bold</div>
  <div class="label">700 it</div><div class="sample" style="font-weight:700;font-style:italic">Swansea Bold Italic</div>
</div>
<p class="body">For long-form editorial moments — blog posts, founder notes,
changelog entries — Swansea reads warmer than Falling Sky's geometry.
Reserve the heavier display cuts for headlines.</p>
</body></html>
