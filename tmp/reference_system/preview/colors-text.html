<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--sk-bg-0); font-family:var(--sk-font-sans); }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .swatch { width:140px; }
  .chip { height:64px; border-radius:10px; border:1px solid var(--sk-border-strong); display:flex; align-items:center; justify-content:center; }
  .chip span { font-family:var(--sk-font-sans); font-size:14px; font-weight:600; }
  .name { font-size:13px; font-weight:600; color:var(--sk-fg-0); margin-top:8px; }
  .hex  { font-family:var(--sk-font-mono); font-size:11px; color:var(--sk-fg-3); margin-top:2px; }
</style><script id="__sk-theme-param__">(function(){var p=new URLSearchParams(location.search).get('theme');if(p){document.documentElement.setAttribute('data-theme',p);}})();</script>
</head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0A0A0B"><span style="color:#FFFFFF">Aa</span></div><div class="name">fg-0 / bg-0</div><div class="hex">#FFFFFF on #0A0A0B</div></div>
  <div class="swatch"><div class="chip" style="background:#0A0A0B"><span style="color:#E6E6E8">Aa</span></div><div class="name">fg-1 body</div><div class="hex">#E6E6E8</div></div>
  <div class="swatch"><div class="chip" style="background:#0A0A0B"><span style="color:#A9A9B0">Aa</span></div><div class="name">fg-2 muted</div><div class="hex">#A9A9B0</div></div>
  <div class="swatch"><div class="chip" style="background:#0A0A0B"><span style="color:#6E6E78">Aa</span></div><div class="name">fg-3 subtle</div><div class="hex">#6E6E78</div></div>
  <div class="swatch"><div class="chip" style="background:#0A0A0B"><span style="color:#4A4A52">Aa</span></div><div class="name">fg-4 placeholder</div><div class="hex">#4A4A52</div></div>
  <div class="swatch"><div class="chip" style="background:#F5C518"><span style="color:#1A1408">Aa</span></div><div class="name">on yellow</div><div class="hex">#1A1408</div></div>
</div>
</body></html>
