<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../ui_kits/marketing-website/kit.css">
<style>
  body { margin: 0; padding: 32px; background: var(--sk-bg-0); font-family: var(--sk-font-sans); color: var(--sk-fg-1); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; max-width: 760px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .state-label { font-family: var(--sk-font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sk-fg-3); margin-top: 4px; }
</style>
<script id="__sk-theme-param__">(function(){var p=new URLSearchParams(location.search).get('theme');if(p){document.documentElement.setAttribute('data-theme',p);}})();</script>
</head><body>

<div class="grid">

  <!-- Default -->
  <div class="field">
    <label class="sk-field-label">Email</label>
    <input class="sk-input" type="email" placeholder="you@team.com">
    <div class="state-label">Default</div>
  </div>

  <!-- Filled -->
  <div class="field">
    <label class="sk-field-label">Team size</label>
    <select class="sk-select">
      <option>1–5</option><option>6–15</option><option>16–50</option>
    </select>
    <div class="state-label">Filled</div>
  </div>

  <!-- Focused (forced via class) -->
  <div class="field">
    <label class="sk-field-label">Workspace name</label>
    <input class="sk-input is-focused" type="text" value="Acme Robotics">
    <div class="state-label">Focused — yellow border + muted dark halo</div>
  </div>

  <!-- Error -->
  <div class="field">
    <label class="sk-field-label">Email</label>
    <input class="sk-input" type="email" value="" placeholder="" style="border-color: var(--sk-red);">
    <div class="sk-error">Please enter a valid email</div>
    <div class="state-label">Error</div>
  </div>

  <!-- Textarea focused -->
  <div class="field" style="grid-column: 1 / -1;">
    <label class="sk-field-label">What are you trying to ship?</label>
    <textarea class="sk-textarea is-focused" rows="3">A spec-driven workflow for our agent team — keeps planning, implementation, and review aligned across Claude Code, Cursor, and Codex.</textarea>
    <div class="state-label">Textarea — focused</div>
  </div>

</div>

<style>
  /* Force the focus state visually for the preview card */
  .sk-input.is-focused, .sk-textarea.is-focused, .sk-select.is-focused {
    border-color: var(--sk-yellow);
    box-shadow: var(--sk-shadow-focus);
    outline: none;
  }
</style>

</body></html>
