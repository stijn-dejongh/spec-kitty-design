<!doctype html>
<html><head><meta charset="utf-8">
<title>Dark / Light split</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0D0E11; font-family: ui-sans-serif, system-ui, sans-serif; }
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 100vh; }
  .pane { position: relative; display: flex; flex-direction: column; min-width: 0; }
  .pane + .pane { border-left: 1px solid rgba(255,255,255,0.06); }
  .pane.light { background: #F8F5EC; }
  .label {
    position: absolute;
    top: 10px; left: 12px;
    z-index: 2;
    font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 4px;
    pointer-events: none;
  }
  .pane.dark .label  { background: rgba(255,255,255,0.06); color: #D6D6DA; }
  .pane.light .label { background: rgba(20,20,15,0.06);   color: #5C5C52; }
  iframe { flex: 1; width: 100%; height: 100%; border: 0; display: block; }
</style></head>
<body>
  <div class="split">
    <div class="pane dark"><span class="label">Dark</span><iframe id="d"></iframe></div>
    <div class="pane light"><span class="label">Light</span><iframe id="l"></iframe></div>
  </div>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var src = params.get('src');
  if (!src) { document.body.innerHTML = '<p style="color:#fff;padding:24px;font-family:monospace">Missing ?src=...</p>'; return; }
  // Strip any leading slashes / parent traversal — only allow same-folder filenames
  src = src.replace(/^[\/\\.]+/, '');
  document.getElementById('d').src = src + '?theme=dark';
  document.getElementById('l').src = src + '?theme=light';
})();
</script>
</body></html>
