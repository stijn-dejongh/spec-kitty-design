<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--sk-bg-0); color:var(--sk-fg-0); font-family:var(--sk-font-sans); }
  .row { display:grid; grid-template-columns: 90px 1fr; gap:14px 18px; align-items:baseline; }
  .label { font-family:var(--sk-font-mono); font-size:10px; color:var(--sk-fg-3); letter-spacing:0.14em; text-transform:uppercase; }
  .sample { font-size:22px; line-height:1; }
</style><script id="__sk-theme-param__">(function(){var p=new URLSearchParams(location.search).get('theme');if(p){document.documentElement.setAttribute('data-theme',p);}})();</script>
</head><body>
<div class="row">
  <div class="label">300</div><div class="sample" style="font-weight:300">Falling Sky Light</div>
  <div class="label">400</div><div class="sample" style="font-weight:400">Falling Sky Regular</div>
  <div class="label">500</div><div class="sample" style="font-weight:500">Falling Sky Medium</div>
  <div class="label">600</div><div class="sample" style="font-weight:600">Falling Sky Semibold</div>
  <div class="label">700</div><div class="sample" style="font-weight:700">Falling Sky Bold</div>
  <div class="label">800</div><div class="sample" style="font-weight:800">Falling Sky Extrabold</div>
  <div class="label">900</div><div class="sample" style="font-weight:900">Falling Sky Black</div>
  <div class="label">400 it</div><div class="sample" style="font-weight:400;font-style:italic">Falling Sky Oblique</div>
  <div class="label">700 it</div><div class="sample" style="font-weight:700;font-style:italic">Falling Sky Bold Oblique</div>
</div>
</body></html>
