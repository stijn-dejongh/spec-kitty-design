<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--sk-bg-0); font-family:var(--sk-font-sans); color:var(--sk-fg-1); }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .swatch { width:140px; }
  .chip { height:64px; border-radius:10px; border:1px solid var(--sk-border-strong); }
  .name { font-size:13px; font-weight:600; color:var(--sk-fg-0); margin-top:8px; }
  .hex  { font-family:var(--sk-font-mono); font-size:11px; color:var(--sk-fg-3); margin-top:2px; }
</style><script id="__sk-theme-param__">(function(){var p=new URLSearchParams(location.search).get('theme');if(p){document.documentElement.setAttribute('data-theme',p);}})();</script>
</head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0A0A0B"></div><div class="name">bg-0 page</div><div class="hex">#0A0A0B</div></div>
  <div class="swatch"><div class="chip" style="background:#111114"></div><div class="name">bg-1 section</div><div class="hex">#111114</div></div>
  <div class="swatch"><div class="chip" style="background:#161619"></div><div class="name">bg-2 card</div><div class="hex">#161619</div></div>
  <div class="swatch"><div class="chip" style="background:#1C1C20"></div><div class="name">bg-3 input</div><div class="hex">#1C1C20</div></div>
  <div class="swatch"><div class="chip" style="background:#1F1F23"></div><div class="name">bg-pill</div><div class="hex">#1F1F23</div></div>
  <div class="swatch"><div class="chip" style="background:#26262C"></div><div class="name">border</div><div class="hex">#26262C</div></div>
  <div class="swatch"><div class="chip" style="background:#34343C"></div><div class="name">border-strong</div><div class="hex">#34343C</div></div>
</div>
</body></html>
