name: Docs Diagrams (drift check)

on:
  pull_request:
    paths: ["docs/architecture/assets/**"]
  push:
    branches: [main]
    paths: ["docs/architecture/assets/**"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # actions/checkout v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # actions/setup-node v6.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Chromium (required by puppeteer-config.json)
        run: sudo apt-get install -y chromium-browser
      - name: "[ENFORCED] Render diagrams — drift check (FR-014, FR-015)"
        run: node scripts/render-diagrams.js --check
