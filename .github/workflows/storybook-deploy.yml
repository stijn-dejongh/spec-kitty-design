name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Storybook source and configuration
      - "apps/storybook/**"
      # Publishable packages that feed the Storybook catalog
      - "packages/tokens/**"
      - "packages/angular/**"
      - "packages/html-js/**"
      # Static demo pages
      - "apps/demo/**"
      # Workflow file itself
      - ".github/workflows/storybook-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # actions/setup-node v6.4.0
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci --ignore-scripts
      - run: npx nx run-many --target=build --projects=tokens,angular,html-js
      - run: npx nx run storybook:storybook:build
      - name: Copy demo pages into Storybook deploy artifact
        run: |
          # Demo pages reference component CSS and tokens via relative paths from apps/demo/.
          # When deployed under /demo/ on Pages, those relative paths must still resolve.
          # We copy the packages/ source alongside the demo pages so ../.. still works.
          mkdir -p apps/storybook/storybook-static/demo
          cp apps/demo/*.html apps/storybook/storybook-static/demo/
          # Expose the packages directory tree (tokens dist, html-js src CSS) under the artifact
          mkdir -p apps/storybook/storybook-static/packages
          cp -r packages/tokens/dist  apps/storybook/storybook-static/packages/tokens/
          cp -r packages/html-js/src  apps/storybook/storybook-static/packages/html-js/
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # actions/configure-pages v6.0.0
        with:
          enablement: true  # auto-enable Pages if not already configured via Settings → Pages → GitHub Actions
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # actions/upload-pages-artifact v3.0.1
        with:
          path: apps/storybook/storybook-static/
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # actions/deploy-pages v5.0.0
        id: deployment
