name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # actions/setup-node v6.4.0
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci --ignore-scripts
      - run: npx nx run-many --target=build --projects=tokens,angular,html-js
      - run: npx nx run storybook:storybook:build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # actions/configure-pages v6.0.0
        with:
          enablement: true  # auto-enable Pages if not already configured via Settings → Pages → GitHub Actions
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # actions/upload-pages-artifact v3.0.1
        with:
          path: apps/storybook/storybook-static/
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # actions/deploy-pages v5.0.0
        id: deployment
