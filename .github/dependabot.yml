version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    groups:
      angular:
        patterns: ["@angular/*", "@nx/angular*", "zone.js"]
      storybook:
        patterns: ["@storybook/*", "storybook"]
      playwright:
        patterns: ["@playwright/*"]
      nx:
        patterns: ["@nx/*", "nx"]
      lint-tools:
        patterns: ["eslint*", "stylelint*", "@typescript-eslint*", "htmlhint", "commitlint*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
