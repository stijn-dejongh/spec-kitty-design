<!-- @spec-kitty/html-js — sk-form-input (Error state) -->
<!-- aria-invalid + aria-describedby required for axe compliance (WCAG 2.1 AA) -->
<div class="sk-form-field sk-form-field--error">
  <label class="sk-form-field__label" for="field-email-error">Email address</label>
  <input
    class="sk-input"
    id="field-email-error"
    type="email"
    value=""
    aria-invalid="true"
    aria-describedby="field-email-error-msg"
  />
  <span
    id="field-email-error-msg"
    class="sk-form-field__description"
    role="alert"
  >Please enter a valid email address.</span>
</div>
