<!-- @spec-kitty/html-js — sk-form-textarea (Error state) -->
<!-- aria-invalid + aria-describedby required for axe compliance (WCAG 2.1 AA) -->
<div class="sk-form-field sk-form-field--error">
  <label class="sk-form-field__label" for="field-textarea-error">What are you trying to ship?</label>
  <textarea
    class="sk-textarea"
    id="field-textarea-error"
    rows="4"
    aria-invalid="true"
    aria-describedby="field-textarea-error-msg"
  ></textarea>
  <span
    id="field-textarea-error-msg"
    class="sk-form-field__description"
    role="alert"
  >This field is required.</span>
</div>
