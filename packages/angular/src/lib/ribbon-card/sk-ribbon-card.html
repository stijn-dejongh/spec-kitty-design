<article class="sk-ribbon-card">
  @if (ribbonLabel) {
    <div
      class="sk-ribbon-card__ribbon"
      [class.sk-ribbon-card__ribbon--yellow]="ribbonVariant === 'yellow'"
      [class.sk-ribbon-card__ribbon--green]="ribbonVariant === 'green'"
      [class.sk-ribbon-card__ribbon--purple]="ribbonVariant === 'purple'"
      [class.sk-ribbon-card__ribbon--blue]="ribbonVariant === 'blue'"
      [class.sk-ribbon-card__ribbon--red]="ribbonVariant === 'red'"
    >{{ ribbonLabel }}</div>
  }
  <div class="sk-ribbon-card__content">
    <ng-content></ng-content>
  </div>
</article>
