<textarea
  class="sk-textarea"
  [class.sk-textarea--error]="hasError"
  [id]="textareaId"
  [placeholder]="placeholder"
  [rows]="rows"
  [disabled]="disabled"
  [attr.aria-invalid]="hasError ? 'true' : null"
  [attr.aria-describedby]="hasError && textareaId ? textareaId + '-error' : null"
  (input)="onInput($event)"
  (blur)="onTouched()"
>{{ value }}</textarea>
