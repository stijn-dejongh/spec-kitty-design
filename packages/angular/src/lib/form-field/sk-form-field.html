<div class="sk-form-field" [class.sk-form-field--error]="hasError">
  <label
    *ngIf="label"
    class="sk-form-field__label"
    [attr.for]="fieldId"
  >{{ label }}</label>
  <ng-content></ng-content>
  <span
    *ngIf="errorMessage && hasError"
    [id]="fieldId + '-error'"
    class="sk-form-field__description"
    role="alert"
  >{{ errorMessage }}</span>
  <span
    *ngIf="description && !hasError"
    class="sk-form-field__description"
  >{{ description }}</span>
</div>
