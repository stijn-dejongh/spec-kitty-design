<input
  class="sk-input"
  [class.sk-input--error]="hasError"
  [id]="inputId"
  [type]="type"
  [placeholder]="placeholder"
  [value]="value"
  [disabled]="disabled"
  [attr.aria-invalid]="hasError ? 'true' : null"
  [attr.aria-describedby]="hasError && inputId ? inputId + '-error' : null"
  (input)="onInput($event)"
  (blur)="onTouched()"
/>
