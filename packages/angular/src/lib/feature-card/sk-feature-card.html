<article class="sk-feature-card">
  <div
    class="sk-feature-card__icon-chip"
    [class.sk-feature-card__icon-chip--yellow]="iconVariant === 'yellow'"
    [class.sk-feature-card__icon-chip--green]="iconVariant === 'green'"
    [class.sk-feature-card__icon-chip--purple]="iconVariant === 'purple'"
  >
    <ng-content select="[slot=icon]">
      <!-- Default icon placeholder when no icon is projected -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>
      </svg>
    </ng-content>
  </div>
  <h4 class="sk-feature-card__title">{{ title }}</h4>
  <p class="sk-feature-card__body">
    <ng-content></ng-content>
  </p>
</article>
