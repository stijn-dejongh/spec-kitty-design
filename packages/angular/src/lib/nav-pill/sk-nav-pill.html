<nav class="sk-nav-pill" aria-label="Primary navigation">
  <div class="sk-nav-pill__items">
    <a
      *ngFor="let item of items"
      [href]="item.href"
      class="sk-nav-pill__item"
      [class.sk-nav-pill__item--active]="item.active"
      [attr.aria-current]="item.active ? 'page' : null"
    >{{ item.label }}</a>
  </div>
  <div class="sk-nav-pill__cta" *ngIf="ctaLabel">
    <a
      *ngIf="ctaHref; else ctaButton"
      [href]="ctaHref"
      class="sk-nav-pill__cta-btn"
    >{{ ctaLabel }}</a>
    <ng-template #ctaButton>
      <button class="sk-nav-pill__cta-btn" type="button">{{ ctaLabel }}</button>
    </ng-template>
  </div>
</nav>
